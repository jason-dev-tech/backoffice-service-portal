name: Remote Deploy

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          test -n "${DEPLOY_HOST}" || { echo "DEPLOY_HOST repository variable is required"; exit 1; }
          test -n "${DEPLOY_USER}" || { echo "DEPLOY_USER repository variable is required"; exit 1; }
          test -n "${DEPLOY_DIR}" || { echo "DEPLOY_DIR repository variable is required"; exit 1; }
          test -n "${SSH_PRIVATE_KEY}" || { echo "SSH_PRIVATE_KEY secret is required"; exit 1; }

      - name: Prepare SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          SSH_KEY_PATH="${RUNNER_TEMP}/deploy_key"
          printf '%s\n' "${SSH_PRIVATE_KEY}" > "${SSH_KEY_PATH}"
          chmod 600 "${SSH_KEY_PATH}"
          echo "SSH_KEY_PATH=${SSH_KEY_PATH}" >> "${GITHUB_ENV}"

      - name: Verify remote deployment target
        run: infra/deploy/verify-deployment.sh

      - name: Deploy remotely
        run: infra/deploy/deploy.sh
