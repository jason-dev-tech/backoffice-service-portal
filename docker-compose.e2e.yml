services:
  postgres-e2e:
    image: postgres:16.4-alpine
    container_name: backoffice-postgres-e2e
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "55432:5432"
    volumes:
      - postgres-e2e-data:/var/lib/postgresql/data

volumes:
  postgres-e2e-data:
