name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: >
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.event == 'push'
      }}
    steps:
      - name: Deploy over SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_REPO_DIR: ${{ secrets.EC2_REPO_DIR }}
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_SSH_KNOWN_HOSTS: ${{ secrets.EC2_SSH_KNOWN_HOSTS }}
        run: |
          set -eu

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$EC2_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$EC2_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

          SSH_PORT="${EC2_PORT:-22}"

          ssh \
            -i "$HOME/.ssh/id_ed25519" \
            -p "$SSH_PORT" \
            "$EC2_USER@$EC2_HOST" <<EOF
          set -eu

          cd "$EC2_REPO_DIR"
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          docker compose down
          docker compose up -d --build

          attempts=0
          max_attempts=10

          until curl --fail --silent http://127.0.0.1:8080/health/ready > /dev/null; do
            attempts=\$((attempts + 1))

            if [ "\$attempts" -ge "\$max_attempts" ]; then
              echo "Deployment health check failed after \$max_attempts attempts."
              docker compose ps
              exit 1
            fi

            sleep 10
          done
          EOF
