name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: [self-hosted, Linux, X64, ec2, backoffice-prod]
    if: >
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.event == 'push'
      }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Deploy locally
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
          HTTPS_CERT_PATH: ${{ secrets.HTTPS_CERT_PATH }}
          HTTPS_CERT_PASSWORD: ${{ secrets.HTTPS_CERT_PASSWORD }}
          BootstrapAdmin__Username: ${{ secrets.BootstrapAdmin__Username }}
          BootstrapAdmin__Password: ${{ secrets.BootstrapAdmin__Password }}
          BootstrapAdmin__Email: ${{ secrets.BootstrapAdmin__Email }}
          BootstrapAdmin__FullName: ${{ secrets.BootstrapAdmin__FullName }}
        run: |
          set -eu

          cd "$GITHUB_WORKSPACE"
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          docker compose down
          docker compose up -d --build

          attempts=0
          max_attempts=10

          until curl --fail --silent http://127.0.0.1:8080/health/ready > /dev/null; do
            attempts=$((attempts + 1))

            if [ "$attempts" -ge "$max_attempts" ]; then
              echo "Deployment health check failed after $max_attempts attempts."
              docker compose ps
              exit 1
            fi

            sleep 10
          done
