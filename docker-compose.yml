services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 5s

  backend:
    image: ghcr.io/jason-dev-tech/backoffice-service-portal:latest
    restart: unless-stopped
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Jwt__Key: ${JWT_KEY}
      ASPNETCORE_Kestrel__Certificates__Default__Path: ${HTTPS_CERT_PATH}
      ASPNETCORE_Kestrel__Certificates__Default__Password: ${HTTPS_CERT_PASSWORD}
      BootstrapAdmin__Username: ${BootstrapAdmin__Username}
      BootstrapAdmin__Password: ${BootstrapAdmin__Password}
      BootstrapAdmin__Email: ${BootstrapAdmin__Email}
      BootstrapAdmin__FullName: ${BootstrapAdmin__FullName}
      ASPNETCORE_URLS: "http://+:8080;https://+:8443"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
      - "443:8443"
    volumes:
      - /home/ubuntu/backoffice-service-portal.pfx:/https/backoffice-service-portal.pfx:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/ready > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

volumes:
  postgres_data:
