<div class="login-page">
  <section class="login-card" aria-labelledby="login-title">
    <header class="login-header">
      <h1 id="login-title">Login</h1>
      <p>Sign in to access the Backoffice Service Portal.</p>
    </header>

    <div class="login-form">
      @if (errorMessage) {
        <p class="login-error">{{ errorMessage }}</p>
      }

      <div class="login-field">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          [value]="username"
          (input)="username = $any($event.target).value"
          [disabled]="isSubmitting"
        />
      </div>

      <div class="login-field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          [value]="password"
          (input)="password = $any($event.target).value"
          [disabled]="isSubmitting"
        />
      </div>

      <div class="login-actions">
        <button type="button" (click)="login()" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Signing in...' : 'Sign in' }}
        </button>
      </div>
    </div>
  </section>
</div>
