name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: [self-hosted, Linux, X64, ec2, backoffice-prod]
    if: >
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.event == 'push'
      }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DEPLOY_CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy locally
        env:
          POSTGRES_DB: ${{ vars.DEPLOY_POSTGRES_DB }}
          POSTGRES_USER: ${{ vars.DEPLOY_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
          HTTPS_CERT_PATH: ${{ secrets.HTTPS_CERT_PATH }}
          HTTPS_CERT_PASSWORD: ${{ secrets.HTTPS_CERT_PASSWORD }}
          BootstrapAdmin__Username: ${{ vars.DEPLOY_BOOTSTRAP_ADMIN_USERNAME }}
          BootstrapAdmin__Password: ${{ secrets.BootstrapAdmin__Password }}
          BootstrapAdmin__Email: ${{ vars.DEPLOY_BOOTSTRAP_ADMIN_EMAIL }}
          BootstrapAdmin__FullName: ${{ vars.DEPLOY_BOOTSTRAP_ADMIN_FULL_NAME }}
        run: |
          set -eu

          cd "$GITHUB_WORKSPACE"
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          docker compose pull
          docker compose down
          docker compose up -d

          attempts=0
          max_attempts=10

          until curl --fail --silent http://${{ vars.DEPLOY_BACKEND_HOST }}:${{ vars.DEPLOY_BACKEND_PORT }}/health/ready > /dev/null; do
            attempts=$((attempts + 1))

            if [ "$attempts" -ge "$max_attempts" ]; then
              echo "Deployment health check failed after $max_attempts attempts."
              docker compose ps
              exit 1
            fi

            sleep 10
          done
